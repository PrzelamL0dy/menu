<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Przełam Lody Cafe - Menu</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins',sans-serif;
            background:linear-gradient(135deg,#f2fbff,#d6f6f7);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .container{
            width:100%;
            max-width:430px;
            background:white;
            border-radius:28px;
            padding:45px 35px;
            text-align:center;
            box-shadow:0 20px 45px rgba(0,0,0,.12);
        }

         .logo{
            width:180px;
            max-width:80%;
            height:auto;
            margin:0 auto 25px;
            display:block;
        }

        h1{
            color:#6E3C22;
            font-size:32px;
            margin-bottom:10px;
        }

        .subtitle{
            color:#777;
            line-height:1.6;
            margin-bottom:35px;
            font-size:17px;
        }

        .button{
            display:block;
            width:100%;
            text-decoration:none;
            background: rgb(209, 119, 145);
            color:white;
            padding:18px;
            border-radius:16px;
            margin:15px 0;
            font-size:20px;
            font-weight:600;
            transition:.25s;
        }

        .button:hover{
            background:rgb(179, 87, 113);
            transform:translateY(-2px);
        }

        .footer{
            margin-top:35px;
            color:#999;
            font-size:14px;
        }

        @media(max-width:500px){

            .container{
                padding:35px 25px;
            }

            h1{
                font-size:28px;
            }

            .button{
                font-size:18px;
            }

        }

    </style>

</head>

<body>

<div class="container">

    <img src="logo_PrzelamLody_final.png" alt="Przełam Lody Cafe" class="logo">

    <h1>Przełam Lody Cafe</h1>

    <p class="subtitle">
        Wybierz język menu<br>
        <strong>Choose your menu language</strong>
    </p>

    <a class="button"
       href="https://drive.google.com/file/d/1XUGeNoyc3_S-IqNqypuLpgRe-SYTX0Ic/view?usp=drivesdk"
       target="_blank">
        🇵🇱 MENU POLSKIE
    </a>

    <a class="button"
       href="https://drive.google.com/file/d/1HsvFQ9qmo9zSnokRniy58En91BTFEGau/view?usp=drivesdk"
       target="_blank">
        🇬🇧 ENGLISH MENU
    </a>

    <div class="footer">
        Miłego dnia! <br>
        Have a lovely day!
    </div>

</div>

</body>
</html>
